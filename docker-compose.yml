services:
  flask:
    build: .
    container_name: flask_app
    network:
      - app_network
    restart: on-failure
    env_file: .env
    volumes:
      - ./app/server_metrics.csv:/app/server_metrics.csv
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          memory: 100M
          
  db:
    image: mysql:latest
    container_name: db_app
    env_file: 
      - .env
    restart: always
    networks: 
      - app_network
    volumes:
      - app_volumes:/var/lib/mysql
      
  redis:
    image: redis:alpine
    container_name: app_redis
    networks:
      - app_network
                 
  nginx:
    image: nginx:alpine
    container_name: app_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    networks:
      - app_network
    depends_on:
      - flask     

  grafana:
    image: grafana/grafana:latest
    container_name: app_grafana
    ports:
      - "3000:3000"
    networks:
      - app_network

networks: 
  app_network:
volumes: 
  app_volumes: 
